# DO NOT COMMIT WITH REAL VALUES
# Create with: kubectl create secret generic sentinel-secrets --from-env-file=.env -n food-price-sentinel
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-secrets
  namespace: food-price-sentinel
type: Opaque
stringData:
  KAFKA_BOOTSTRAP_SERVERS: "<aiven-kafka-host>:<port>"
  VALKEY_HOST: "<aiven-valkey-host>"
  VALKEY_PORT: "<port>"
  VALKEY_PASSWORD: "<password>"
  POSTGRES_URL: "postgresql://<user>:<password>@<host>:<port>/defaultdb?sslmode=require"

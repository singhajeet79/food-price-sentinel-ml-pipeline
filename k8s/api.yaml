apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: food-price-sentinel
  labels:
    app: api
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api
        component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/singhajeet79/food-price-sentinel:latest
          imagePullPolicy: Never
          command:
            - uvicorn
            - api.main:app
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --workers
            - "2"
          env:
            - name: PYTHONPATH
              value: "/app"
            - name: KAFKA_SSL_CAFILE
              value: "/app/certs/ca.pem"
            - name: KAFKA_SSL_CERTFILE
              value: "/app/certs/service.cert"
            - name: KAFKA_SSL_KEYFILE
              value: "/app/certs/service.key"
          envFrom:
            - configMapRef:
                name: sentinel-config
            - secretRef:
                name: sentinel-secrets
          volumeMounts:
            - name: certs
              mountPath: /app/certs
              readOnly: true
            - name: models
              mountPath: /app/detection/models
              readOnly: true
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 45      # Increased for Aiven warm-up
            timeoutSeconds: 20     # Increased based on your 11s log delay
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            timeoutSeconds: 20
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: certs
          secret:
            secretName: sentinel-kafka-certs
        - name: models
          persistentVolumeClaim:
            claimName: sentinel-models-pvc
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: food-price-sentinel
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP

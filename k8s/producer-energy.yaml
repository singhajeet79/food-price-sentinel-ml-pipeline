apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer-energy
  namespace: food-price-sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer-energy
  template:
    metadata:
      labels:
        app: producer-energy
    spec:
      containers:
      - name: producer
        image: ghcr.io/singhajeet79/food-price-sentinel:latest
        imagePullPolicy: Never
        command: ["python", "ingestion/producer_energy.py", "--interval", "120"]
        env:
        - name: PYTHONPATH
          value: "/app"
        - name: KAFKA_SSL_CAFILE
          value: "/app/certs/ca.pem"
        - name: KAFKA_SSL_CERTFILE
          value: "/app/certs/service.cert"
        - name: KAFKA_SSL_KEYFILE
          value: "/app/certs/service.key"
        envFrom:
        - configMapRef:
            name: sentinel-config
        - secretRef:
            name: sentinel-secrets
        volumeMounts:
        - name: certs
          mountPath: /app/certs
          readOnly: true
      volumes:
      - name: certs
        secret:
          secretName: sentinel-kafka-certs

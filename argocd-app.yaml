apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: food-price-sentinel
  labels:
    reconcile: "true"
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/singhajeet79/food-price-sentinel-ml-pipeline.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: food-price-sentinel
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
